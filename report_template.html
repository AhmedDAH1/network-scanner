<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Scan Report</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:         #090d13;
            --bg2:        #0d1420;
            --bg3:        #111b2a;
            --border:     #1a2d45;
            --accent:     #00d4ff;
            --accent2:    #0088cc;
            --green:      #00ff88;
            --red:        #ff4466;
            --yellow:     #ffcc00;
            --text:       #c8daf0;
            --text-dim:   #4a6a8a;
            --text-mid:   #7a9ab8;
            --mono:       'Share Tech Mono', monospace;
            --sans:       'Rajdhani', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            font-size: 15px;
            min-height: 100vh;
        }

        /* ── Background grid ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .wrap {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 24px 80px;
        }

        /* ── Header ── */
        header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 32px;
            margin-bottom: 40px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo-area h1 {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--accent);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .logo-area h2 {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px;
        }

        .logo-area h2 span { color: var(--accent); }

        .meta {
            text-align: right;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-dim);
            line-height: 2;
        }

        .meta strong { color: var(--text-mid); }

        /* ── Summary bar ── */
        .summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 40px;
        }

        .stat {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-top: 2px solid var(--accent);
            padding: 16px 20px;
            position: relative;
            overflow: hidden;
        }

        .stat::after {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 40px; height: 40px;
            background: radial-gradient(circle at top right, rgba(0,212,255,0.08), transparent 70%);
        }

        .stat-label {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
            font-family: var(--mono);
        }

        /* ── Host card ── */
        .host-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            margin-bottom: 24px;
            animation: fadeIn 0.4s ease both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .host-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: var(--bg3);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 12px;
            cursor: pointer;
            user-select: none;
        }

        .host-header:hover { background: #141e2e; }

        .host-ip {
            font-family: var(--mono);
            font-size: 18px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .host-ip::before {
            content: '▶';
            font-size: 9px;
            color: var(--accent);
        }

        .host-mac {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 2px;
        }

        .badges {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .badge {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 1px;
            padding: 3px 10px;
            border: 1px solid;
            text-transform: uppercase;
        }

        .badge-os   { color: var(--yellow); border-color: rgba(255,204,0,0.3); background: rgba(255,204,0,0.05); }
        .badge-dev  { color: var(--accent);  border-color: rgba(0,212,255,0.3); background: rgba(0,212,255,0.05); }
        .badge-vend { color: var(--green);   border-color: rgba(0,255,136,0.3); background: rgba(0,255,136,0.05); }
        .badge-rand { color: var(--text-dim);border-color: var(--border);       background: transparent; }

        .host-body {
            padding: 24px;
        }

        /* ── Section label ── */
        .section-label {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 3px;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ── Port table ── */
        .port-table {
            width: 100%;
            border-collapse: collapse;
            font-family: var(--mono);
            font-size: 13px;
            margin-bottom: 28px;
        }

        .port-table th {
            text-align: left;
            padding: 8px 14px;
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--text-dim);
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
            font-family: var(--sans);
            font-weight: 600;
        }

        .port-table td {
            padding: 10px 14px;
            border-bottom: 1px solid rgba(26,45,69,0.5);
            color: var(--text);
            vertical-align: middle;
        }

        .port-table tr:last-child td { border-bottom: none; }

        .port-table tr:hover td { background: rgba(0,212,255,0.03); }

        .port-num {
            color: var(--accent);
            font-weight: bold;
        }

        .proto-tcp { color: var(--green); }
        .proto-udp { color: var(--yellow); }

        .service-name { color: #fff; }

        .banner-text {
            color: var(--text-mid);
            font-size: 11px;
            max-width: 400px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ── CVE table ── */
        .cve-table {
            width: 100%;
            border-collapse: collapse;
            font-family: var(--mono);
            font-size: 12px;
            margin-top: 6px;
            margin-bottom: 20px;
        }
        .cve-table td {
            padding: 7px 12px;
            border-bottom: 1px solid rgba(26,45,69,0.4);
            vertical-align: top;
        }
        .cve-table tr:last-child td { border-bottom: none; }
        .cve-table tr:hover td { background: rgba(255,68,102,0.03); }

        .cve-id   { color: var(--accent); white-space: nowrap; width: 140px; }
        .cve-desc { color: var(--text-mid); }

        .sev-CRITICAL { color: #ff2244; font-weight: bold; width: 80px; }
        .sev-HIGH     { color: #ff6622; font-weight: bold; width: 80px; }
        .sev-MEDIUM   { color: var(--yellow); width: 80px; }
        .sev-LOW      { color: var(--text-dim); width: 80px; }
        .sev-UNKNOWN  { color: var(--text-dim); width: 80px; }

        .no-ports {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text-dim);
            padding: 12px 0;
        }

        /* ── Footer ── */
        footer {
            margin-top: 60px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        footer span {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-dim);
        }

        footer strong { color: var(--accent); }
    </style>
</head>
<body>
<div class="wrap">

    <!-- Header -->
    <header>
        <div class="logo-area">
            <h1>// network recon</h1>
            <h2>Scan <span>Report</span></h2>
        </div>
        <div class="meta" id="meta-block">
            <div><strong>DATE</strong> &nbsp; —</div>
            <div><strong>HOSTS</strong> &nbsp; —</div>
            <div><strong>OPEN PORTS</strong> &nbsp; —</div>
        </div>
    </header>

    <!-- Summary stats -->
    <div class="summary" id="summary"></div>

    <!-- Host cards -->
    <div id="hosts"></div>

    <!-- Footer -->
    <footer>
        <span>Generated by <strong>Network Scanner v1.1</strong> · Ahmed Dahdouh</span>
        <span id="footer-time"></span>
    </footer>

</div>

<script>
// ── Inject scan data ──────────────────────────────────────────────
const SCAN_DATA = __SCAN_DATA__;

// ── Helpers ──────────────────────────────────────────────────────
function countPorts(hosts) {
    return hosts.reduce((n, h) =>
        n + (h.tcp_ports?.length || 0) + (h.udp_ports?.length || 0), 0);
}

function isRandomized(vendor) {
    return vendor && vendor.toLowerCase().includes("randomized");
}

function now() {
    return new Date().toLocaleString('en-US', {
        year: 'numeric', month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit'
    });
}

// ── Meta block ────────────────────────────────────────────────────
const totalPorts = countPorts(SCAN_DATA);
document.getElementById('meta-block').innerHTML = `
    <div><strong>DATE</strong> &nbsp; ${now()}</div>
    <div><strong>HOSTS</strong> &nbsp; ${SCAN_DATA.length}</div>
    <div><strong>OPEN PORTS</strong> &nbsp; ${totalPorts}</div>
`;

// ── Summary stats ─────────────────────────────────────────────────
const tcpTotal = SCAN_DATA.reduce((n, h) => n + (h.tcp_ports?.length || 0), 0);
const udpTotal = SCAN_DATA.reduce((n, h) => n + (h.udp_ports?.length || 0), 0);
const vendors  = new Set(SCAN_DATA.map(h => h.vendor).filter(v => v && !isRandomized(v) && v !== 'Unknown'));

document.getElementById('summary').innerHTML = `
    <div class="stat"><div class="stat-label">Hosts Found</div><div class="stat-value">${SCAN_DATA.length}</div></div>
    <div class="stat"><div class="stat-label">TCP Ports Open</div><div class="stat-value">${tcpTotal}</div></div>
    <div class="stat"><div class="stat-label">UDP Ports Open</div><div class="stat-value">${udpTotal}</div></div>
    <div class="stat"><div class="stat-label">Vendors ID'd</div><div class="stat-value">${vendors.size}</div></div>
`;

// ── Host cards ────────────────────────────────────────────────────
function severityClass(sev) {
    return 'sev-' + (sev || 'UNKNOWN').toUpperCase();
}

function cveRows(cves) {
    if (!cves || cves.length === 0) return '';
    const rows = cves.map(c => `
        <tr>
            <td class="cve-id">${c.id}</td>
            <td class="${severityClass(c.severity)}">${c.severity}</td>
            <td class="cve-desc">${c.desc}</td>
        </tr>`).join('');
    return `<table class="cve-table">${rows}</table>`;
}

function portRow(port, service, banner, proto, cves) {
    const protoClass = proto === 'UDP' ? 'proto-udp' : 'proto-tcp';
    const cveSection = cveRows(cves);
    return `
        <tr>
            <td><span class="port-num">${port}</span></td>
            <td><span class="${protoClass}">${proto}</span></td>
            <td><span class="service-name">${service}</span></td>
            <td>
                <span class="banner-text">${banner || '—'}</span>
                ${cveSection}
            </td>
        </tr>`;
}

function hostCard(host, i) {
    const rand = isRandomized(host.vendor);
    const vendorBadge = rand
        ? `<span class="badge badge-rand">Privacy MAC</span>`
        : host.vendor && host.vendor !== 'Unknown'
            ? `<span class="badge badge-vend">${host.vendor}</span>`
            : '';

    const osBadge     = host.os     && host.os     !== 'Unknown' ? `<span class="badge badge-os">${host.os}</span>` : '';
    const deviceBadge = host.device && host.device !== 'Unknown' ? `<span class="badge badge-dev">${host.device.replace(' (Randomized MAC (Privacy Mode))', '')}</span>` : '';
    const hostnameLine = host.hostname ? `<div class="host-mac" style="color:var(--green);margin-top:4px">⌘ ${host.hostname}.local</div>` : '';
    const servicesLine = host.services?.length ? `<div class="host-mac" style="margin-top:4px">⚡ ${host.services.join(' · ')}</div>` : '';

    let tcpSection = '';
    if (host.tcp_ports?.length) {
        tcpSection = `
            <div class="section-label">TCP Ports</div>
            <table class="port-table">
                <thead><tr><th>Port</th><th>Proto</th><th>Service</th><th>Banner</th></tr></thead>
                <tbody>${host.tcp_ports.map(p => portRow(p.port, p.service, p.banner, 'TCP', p.cves)).join('')}</tbody>
            </table>`;
    } else {
        tcpSection = `<div class="section-label">TCP Ports</div><div class="no-ports">No open TCP ports detected.</div>`;
    }

    let udpSection = '';
    if (host.udp_ports?.length) {
        udpSection = `
            <div class="section-label" style="margin-top:8px">UDP Ports</div>
            <table class="port-table">
                <thead><tr><th>Port</th><th>Proto</th><th>Service</th><th>Banner</th></tr></thead>
                <tbody>${host.udp_ports.map(p => portRow(p.port, p.service, null, 'UDP')).join('')}</tbody>
            </table>`;
    }

    return `
        <div class="host-card" style="animation-delay: ${i * 0.08}s">
            <div class="host-header">
                <div>
                    <div class="host-ip">${host.host}</div>
                    <div class="host-mac">${host.mac || 'MAC unknown'}</div>
                    ${hostnameLine}
                    ${servicesLine}
                </div>
                <div class="badges">
                    ${osBadge}
                    ${deviceBadge}
                    ${vendorBadge}
                </div>
            </div>
            <div class="host-body">
                ${tcpSection}
                ${udpSection}
            </div>
        </div>`;
}

document.getElementById('hosts').innerHTML = SCAN_DATA.map((h, i) => hostCard(h, i)).join('');
document.getElementById('footer-time').textContent = now();
</script>
</body>
</html>
